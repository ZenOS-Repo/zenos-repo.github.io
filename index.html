<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple File Explorer</title>
</head>
<body>

<h1>File Explorer</h1>

<div id="path"></div>
<div id="files"></div>

<script>
const OWNER = "ZenOS-Repo";
const REPO = "zenos-repo.github.io";
const BRANCH = "main";

let currentPath = "";

function isIgnored(name) {
  const n = name.toLowerCase();
  return n === "license" || n === "readme.md" || n === "readme";
}

function apiUrl(path) {
  if (!path) {
    return `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`;
  }
  return `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
}

async function load(path) {
  currentPath = path;

  document.getElementById("path").textContent = "/" + path;

  const res = await fetch(apiUrl(path));
  const data = await res.json();

  const container = document.getElementById("files");
  container.innerHTML = "";

  if (!Array.isArray(data)) {
    container.textContent = "Error loading directory";
    return;
  }

  if (path) {
    const up = document.createElement("div");
    up.textContent = ".. (back)";
    up.onclick = () => {
      const parts = path.split("/").filter(Boolean);
      parts.pop();
      load(parts.join("/"));
    };
    container.appendChild(up);
  }

  data
    .filter(item => !isIgnored(item.name))
    .forEach(item => {
      const div = document.createElement("div");

      if (item.type === "dir") {
        div.textContent = "[DIR] " + item.name;
        div.onclick = () => load(item.path);
      } else {
        div.textContent = item.name;
        div.onclick = () => window.open(item.download_url, "_blank");
      }

      container.appendChild(div);
    });
}

load("");
</script>

</body>
</html>
