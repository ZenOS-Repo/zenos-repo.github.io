<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>zenOS repo</title>

<style>
body {
    font-family: serif;
    background: white;
    color: black;
}

.row {
    white-space: pre;
}

.package {
    cursor: pointer;
}

.package:hover {
    color: blue;
    text-decoration: underline;
}
</style>
</head>
<body>

<h1 id="path">/</h1>

<div id="files"></div>

<script>
const OWNER = "ZenOS-Repo";
const REPO = "zenos-repo.github.io";
const BRANCH = "main";

function isIgnored(name) {
    const n = name.toLowerCase();
    return n === "license" ||
           n === "license.md" ||
           n === "readme" ||
           n === "readme.md" ||
           n === "index.html";
}

function apiUrl(path) {
    if (!path) {
        return `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`;
    }

    return `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
}

function setPath(path) {
    document.getElementById("path").textContent =
        "/" + REPO + (path ? "/" + path : "");
}

async function load(path) {
    setPath(path);

    const files = document.getElementById("files");
    files.innerHTML = "Loading...";

    try {
        const res = await fetch(apiUrl(path));
        const data = await res.json();

        files.innerHTML = "";

        if (!Array.isArray(data)) {
            files.textContent = "Error loading directory";
            return;
        }

        if (path) {
            const up = document.createElement("div");
            up.className = "row";

            const link = document.createElement("span");
            link.className = "package";
            link.textContent = "..";

            link.onclick = () => {
                const parts = path.split("/").filter(Boolean);
                parts.pop();
                load(parts.join("/"));
            };

            up.appendChild(link);
            files.appendChild(up);
        }

        data
            .filter(item => !isIgnored(item.name))
            .sort((a, b) => {
                if (a.type !== b.type) {
                    return a.type === "dir" ? -1 : 1;
                }
                return a.name.localeCompare(b.name);
            })
            .forEach(item => {
                const row = document.createElement("div");
                row.className = "row";

                const link = document.createElement("span");
                link.className = "package";

                if (item.type === "dir") {
                    link.textContent = item.name + "/";
                    link.onclick = () => load(item.path);
                } else {
                    link.textContent = item.name;
                    link.onclick = () => {
                        window.open(item.download_url, "_blank");
                    };
                }

                row.appendChild(link);
                files.appendChild(row);
            });

    } catch (err) {
        files.textContent = "Error loading directory";
        console.error(err);
    }
}

load("");
</script>

</body>
</html>
