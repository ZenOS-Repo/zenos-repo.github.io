<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>zenOS repo</title>

<style>
  body {
    margin: 0;
    font-family: monospace;
    background: #fff;
    color: #000;
  }

  pre {
    margin: 0;
    padding: 10px 12px;
    white-space: pre;
  }

  .row {
    cursor: pointer;
    white-space: pre;
  }

  .word {
    color: #000;
  }

  /* hover effect: ONLY word turns blue + underline */
  .row:hover .word {
    color: blue;
    text-decoration: underline;
  }
</style>
</head>

<body>

<h1>
/
</h1>

<pre id="path"></pre>
<pre id="files"></pre>

<script>
const OWNER = "ZenOS-Repo";
const REPO = "zenos-repo.github.io";
const BRANCH = "main";

function isIgnored(name) {
  const n = name.toLowerCase();
  return n === "license" || n === "readme.md" || n === "readme";
}

function apiUrl(path) {
  return path
    ? `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`
    : `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`;
}

// word splitter (safe)
function wordify(text) {
  const span = document.createElement("span");

  text.split(/(\s+)/).forEach(part => {
    const s = document.createElement("span");
    s.className = "word";
    s.textContent = part;
    span.appendChild(s);
  });

  return span;
}

function setPath(path) {
  const el = document.getElementById("path");
  el.innerHTML = "";
  el.appendChild(wordify("PATH: /" + (path || "")));
}

function makeRow(text, onClick) {
  const row = document.createElement("div");
  row.className = "row";

  row.appendChild(wordify(text));

  row.addEventListener("click", onClick);

  return row;
}

async function load(path) {
  setPath(path);

  const res = await fetch(apiUrl(path));
  const data = await res.json();

  const container = document.getElementById("files");
  container.innerHTML = "";

  if (!Array.isArray(data)) {
    container.textContent = "error: could not load directory";
    return;
  }

  container.appendChild(wordify("TYPE  NAME"));
  container.appendChild(document.createElement("br"));
  container.appendChild(wordify("----  ------------------------------"));
  container.appendChild(document.createElement("br"));

  if (path) {
    container.appendChild(
      makeRow("DIR   ..", () => {
        const parts = path.split("/").filter(Boolean);
        parts.pop();
        load(parts.join("/"));
      })
    );
  }

  data
    .filter(item => !isIgnored(item.name))
    .sort((a, b) => {
      if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
      return a.name.localeCompare(b.name);
    })
    .forEach(item => {
      const type = item.type === "dir" ? "DIR " : "FILE";

      container.appendChild(
        makeRow(type.padEnd(5) + " " + item.name, () => {
          if (item.type === "dir") {
            load(item.path);
          } else {
            window.open(item.download_url, "_blank");
          }
        })
      );
    });
}

load("");
</script>

</body>
</html>
